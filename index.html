<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#061017" />
  <meta name="format-detection" content="telephone=no,email=no,address=no" />
  <title>你想和我约会吗？</title>
  <style>
    :root{
      --night:#040b10;
      --night-2:#07141b;
      --panel:#0b1b23;
      --panel-soft:#102630;
      --text:#eef4f3;
      --muted:#8fa3a8;
      --line:rgba(184,214,218,.14);
      --line-strong:rgba(184,214,218,.24);
      --teal:#48a8aa;
      --teal-soft:#89c7c3;
      --amber:#e79a45;
      --amber-2:#f0bd73;
      --danger:#d16f5f;
      --shadow:0 24px 70px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth;background:var(--night)}
    body{
      margin:0;
      min-height:100%;
      color:var(--text);
      font-family:"PingFang SC","Microsoft YaHei",Inter,system-ui,-apple-system,sans-serif;
      background:var(--night);
      -webkit-font-smoothing:antialiased;
    }

    button,input,select{font:inherit}
    button{border:0;cursor:pointer;-webkit-tap-highlight-color:transparent}

    .layout{
      min-height:100vh;
      display:grid;
      grid-template-columns:minmax(500px,46%) minmax(0,54%);
      background:var(--night);
    }

    .app-column{
      position:relative;
      z-index:3;
      min-height:100vh;
      padding:42px clamp(30px,4vw,70px) 64px;
      background:
        radial-gradient(circle at 12% 5%,rgba(72,168,170,.12),transparent 26%),
        radial-gradient(circle at 88% 90%,rgba(231,154,69,.09),transparent 32%),
        linear-gradient(145deg,#061017 0%,#08151c 58%,#071118 100%);
      box-shadow:22px 0 70px rgba(0,0,0,.24);
    }

    .app-column::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:.18;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
      background-size:32px 32px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.8),transparent 88%);
    }

    .app-inner{
      position:relative;
      z-index:1;
      width:min(650px,100%);
      margin:0 auto;
    }

    .topline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      margin-bottom:58px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:.15em;
      text-transform:uppercase;
    }

    .mark{display:flex;align-items:center;gap:10px;color:var(--teal-soft);font-weight:700}
    .mark-dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 6px rgba(231,154,69,.11)}

    .view{display:none}
    .view.active{display:block;animation:viewIn .55s cubic-bezier(.2,.8,.2,1)}
    @keyframes viewIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    .question-view{min-height:calc(100vh - 170px);display:flex;flex-direction:column;justify-content:center;padding-bottom:70px}

    .kicker{margin:0 0 18px;color:var(--amber-2);font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase}
    h1,h2,p{margin-top:0}
    h1{
      margin-bottom:38px;
      max-width:600px;
      font-size:clamp(44px,5.2vw,76px);
      line-height:1.06;
      letter-spacing:-.055em;
      font-weight:760;
    }

    .name-block{
      margin-bottom:38px;
      padding:20px;
      border:1px solid var(--line);
      border-radius:20px;
      background:rgba(255,255,255,.025);
      backdrop-filter:blur(10px);
    }

    .name-title{margin-bottom:13px;font-size:13px;color:var(--muted)}
    .name-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field-label{display:block;margin-bottom:7px;color:var(--muted);font-size:12px}
    .text-input,
    .select-input{
      width:100%;
      height:48px;
      border:1px solid var(--line);
      border-radius:13px;
      outline:none;
      color:var(--text);
      background:#0a171e;
      padding:0 14px;
      transition:border-color .18s ease,box-shadow .18s ease,background .18s ease;
    }
    .text-input::placeholder{color:#5f747a}

    /* Windows Chrome / Edge 下拉菜单：白底深色字，避免月份和日期看不清 */
    .select-input{
      color-scheme:light;
    }
    .select-input option{
      color:#102027;
      background:#f7f9f8;
      font-weight:600;
    }
    .select-input option:checked{
      color:#ffffff;
      background:#596164;
    }

    .text-input:focus,.select-input:focus{border-color:rgba(72,168,170,.65);box-shadow:0 0 0 4px rgba(72,168,170,.10);background:#0c1c24}

    .answer-zone{
      position:relative;
      width:100%;
      min-height:132px;
      border-top:1px solid var(--line);
      padding-top:30px;
      overflow:hidden;
    }

    .answer-btn{
      position:absolute;
      top:30px;
      min-width:154px;
      min-height:52px;
      border-radius:999px;
      padding:14px 24px;
      font-weight:720;
      transition:left .18s ease,top .18s ease,transform .18s ease,opacity .18s ease,box-shadow .18s ease;
    }
    .yes-btn{
      left:0;
      color:#071118;
      background:linear-gradient(135deg,var(--amber-2),var(--amber));
      box-shadow:0 12px 30px rgba(231,154,69,.22);
      transform:scale(var(--yes-scale,1));
      transform-origin:left center;
    }
    .yes-btn:hover{box-shadow:0 16px 38px rgba(231,154,69,.30)}
    .no-btn{
      left:184px;
      color:var(--text);
      background:transparent;
      border:1px solid var(--line-strong);
      transform:scale(var(--no-scale,1));
    }
    .answer-status{min-height:24px;margin-top:100px;color:var(--amber-2);font-size:13px}

    .planner-head{margin-bottom:28px}
    .planner-head h2,.success-head h2{margin-bottom:9px;font-size:clamp(34px,4vw,54px);line-height:1.12;letter-spacing:-.045em;font-weight:730}
    .planner-head p,.success-head p{color:var(--muted);line-height:1.8}

    .section{margin-top:30px}
    .section-title{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:13px}
    .section-title strong{font-size:15px}
    .section-title span{color:var(--muted);font-size:12px}

    .date-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .date-card{padding:12px;border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.025)}
    .date-card .field-label{margin-bottom:5px}
    .date-card .select-input{height:40px;padding:0;border:0;background:transparent;box-shadow:none}
    .weekday-card{display:grid;place-items:center;text-align:center}
    .weekday-card strong{display:block;margin-top:4px;color:var(--amber-2);font-size:18px}

    .project-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .project-btn{
      width:100%;
      min-height:58px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      color:var(--text);
      text-align:left;
      border:1px solid var(--line);
      border-radius:15px;
      background:rgba(255,255,255,.024);
      transition:border-color .18s ease,background .18s ease,transform .18s ease;
    }
    .project-btn:hover{border-color:rgba(72,168,170,.42);transform:translateY(-1px)}
    .project-btn.selected{border-color:rgba(231,154,69,.68);background:rgba(231,154,69,.09)}
    .project-icon{width:32px;height:32px;display:grid;place-items:center;flex:0 0 auto;border-radius:10px;background:rgba(72,168,170,.10);font-size:17px}
    .project-name{font-size:14px;font-weight:650}
    .project-check{width:18px;height:18px;margin-left:auto;display:grid;place-items:center;border:1px solid var(--line-strong);border-radius:50%;font-size:11px;color:transparent}
    .project-btn.selected .project-check{color:#071118;border-color:transparent;background:var(--amber-2)}

    .planner-status{margin-top:18px;padding:12px 14px;border-left:2px solid var(--teal);color:var(--teal-soft);background:rgba(72,168,170,.07);font-size:13px;line-height:1.65}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
    .primary,.secondary{
      min-height:50px;
      padding:14px 22px;
      border-radius:999px;
      font-weight:720;
    }
    .primary{color:#071118;background:linear-gradient(135deg,var(--amber-2),var(--amber));box-shadow:0 12px 30px rgba(231,154,69,.20)}
    .secondary{color:var(--text);background:transparent;border:1px solid var(--line-strong)}

    .ticket-preview{
      width:100%;
      margin-top:24px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#071118;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .ticket-preview img{display:block;width:100%;height:auto}

    .visual-column{
      position:sticky;
      top:0;
      height:100vh;
      min-height:620px;
      overflow:hidden;
      background:#02070b;
    }

    .video-stack{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 72% 48%,rgba(16,89,122,.18),transparent 28%),
        #02070b url('fish-poster-hq.jpg') center center/contain no-repeat;
    }
    .fish-video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center center;
      opacity:0;
      z-index:1;
      transition:opacity 1.35s cubic-bezier(.4,0,.2,1);
      filter:saturate(1.05) contrast(1.04) brightness(1.02);
      background:#02070b;
    }
    .fish-video.active{opacity:1}

    .mobile-fish-video{
      display:none;
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      object-position:center;
      background:#02070b;
      filter:saturate(1.05) contrast(1.04) brightness(1.02);
    }

    .mobile-loop-mask{
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
      opacity:0;
      background:#02070b;
      transition:opacity .7s ease;
    }
    .mobile-loop-mask.active{opacity:1}

    .video-overlay{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
      background:
        linear-gradient(90deg,rgba(4,11,16,.42) 0%,rgba(4,11,16,.08) 15%,transparent 30%),
        linear-gradient(180deg,rgba(0,4,7,.06),transparent 18%,transparent 82%,rgba(0,4,7,.16));
    }

    .video-label{
      position:absolute;
      z-index:5;
      left:42px;
      bottom:38px;
      display:flex;
      align-items:center;
      gap:11px;
      color:rgba(235,244,242,.72);
      font-size:11px;
      letter-spacing:.17em;
      text-transform:uppercase;
    }
    .video-label::before{content:"";width:32px;height:1px;background:var(--amber)}

    .toast{
      position:fixed;
      z-index:100;
      left:23%;
      bottom:24px;
      transform:translate(-50%,16px);
      padding:11px 16px;
      border-radius:999px;
      color:#071118;
      background:var(--amber-2);
      opacity:0;
      pointer-events:none;
      transition:.2s ease;
      font-size:13px;
      font-weight:650;
    }
    .toast.show{opacity:1;transform:translate(-50%,0)}

    .confetti{position:fixed;top:-18px;width:8px;height:14px;z-index:99;pointer-events:none;animation:fall linear forwards}
    @keyframes fall{to{transform:translate3d(var(--drift),110vh,0) rotate(720deg);opacity:.9}}

    @media(max-width:980px){
      .layout{display:flex;flex-direction:column}
      .app-column{
        order:1;
        min-height:auto;
        padding:26px 20px 48px;
        box-shadow:none;
      }
      .visual-column{
        order:2;
        position:relative;
        top:auto;
        width:100%;
        height:auto;
        min-height:240px;
        aspect-ratio:16 / 9;
        border-top:1px solid var(--line);
      }
      .desktop-video-stack{display:none}
      .mobile-fish-video{display:block}
      .topline{margin-bottom:32px}
      .question-view{min-height:auto;padding:34px 0 44px}
      .video-label{left:20px;bottom:18px}
      .video-overlay{
        background:
          linear-gradient(180deg,rgba(0,4,7,.04),transparent 22%,transparent 80%,rgba(0,4,7,.18));
      }
      .toast{left:50%}
    }

    @media(max-width:620px){
      .app-column{padding:22px 16px 40px}
      .name-grid,.project-grid{grid-template-columns:1fr}
      .date-grid{grid-template-columns:1fr 1fr}
      .date-card{padding:11px}
      .select-input{font-size:16px}
      h1{font-size:42px}
      .planner-head h2,.success-head h2{font-size:38px}
      .answer-zone{min-height:190px}
      .yes-btn{left:0;right:0;width:100%;transform:scale(var(--yes-scale,1));transform-origin:center}
      .no-btn{left:0;top:94px;width:100%}
      .answer-status{margin-top:160px}
      .visual-column{
        min-height:220px;
        aspect-ratio:16 / 9;
      }
    }

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
      @media(min-width:981px){.fish-video:not(:first-child){display:none}}
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="app-column">
      <div class="app-inner">
        <div class="topline">
          <div class="mark"><span class="mark-dot"></span>Invitation for two</div>
          <div id="stepLabel">01 / 03</div>
        </div>

        <section class="view active" id="questionView">
          <div class="question-view">
            <p class="kicker">One simple question</p>
            <h1>你想和我约会吗？</h1>

            <div class="name-block">
              <div class="name-title">填写双方名称（选填）</div>
              <div class="name-grid">
                <label>
                  <span class="field-label">你的名字</span>
                  <input class="text-input" id="myNameInput" maxlength="12" placeholder="选填" />
                </label>
                <label>
                  <span class="field-label">TA 的名字</span>
                  <input class="text-input" id="partnerNameInput" maxlength="12" placeholder="选填" />
                </label>
              </div>
            </div>

            <div class="answer-zone" id="answerZone">
              <button class="answer-btn yes-btn" id="yesBtn">同意</button>
              <button class="answer-btn no-btn" id="noBtn">不同意</button>
              <div class="answer-status" id="answerStatus"></div>
            </div>
          </div>
        </section>

        <section class="view" id="plannerView">
          <div class="planner-head">
            <p class="kicker">Choose our plan</p>
            <h2>选日期和项目</h2>
            <p>项目可多选，全部选项一次展示。</p>
          </div>

          <div class="section">
            <div class="section-title"><strong>约会日期</strong><span>自动显示周几</span></div>
            <div class="date-grid">
              <label class="date-card"><span class="field-label">年份</span><select class="select-input" id="yearSelect"></select></label>
              <label class="date-card"><span class="field-label">月份</span><select class="select-input" id="monthSelect"></select></label>
              <label class="date-card"><span class="field-label">日期</span><select class="select-input" id="daySelect"></select></label>
              <div class="date-card weekday-card"><span class="field-label">星期</span><strong id="weekdayText">—</strong></div>
            </div>
          </div>

          <div class="section">
            <div class="section-title"><strong>约会项目</strong><span>可多选</span></div>
            <div class="project-grid" id="projectGrid"></div>
          </div>

          <div class="planner-status" id="plannerStatus">选择一个日期和至少一个项目。</div>
          <div class="actions">
            <button class="primary" id="confirmBtn">确认这次约会</button>
            <button class="secondary" id="backBtn">返回上一页</button>
          </div>
        </section>

        <section class="view" id="successView">
          <div class="success-head">
            <p class="kicker">Admit two</p>
            <h2>约会成立</h2>
            <p>门票已经生成，可以保存后转发。</p>
          </div>
          <div class="ticket-preview"><img id="ticketImage" alt="约会门票" /></div>
          <div class="actions">
            <button class="primary" id="saveTicketBtn">保存门票图片</button>
            <button class="secondary" id="copyBtn">复制结果</button>
            <button class="secondary" id="restartBtn">重新选择</button>
          </div>
        </section>
      </div>
    </section>

    <aside class="visual-column" aria-label="鱼群动画">
      <div class="video-stack desktop-video-stack">
        <video class="fish-video active" id="videoA" autoplay muted playsinline webkit-playsinline x5-playsinline preload="auto" poster="fish-poster-hq.jpg"></video>
        <video class="fish-video" id="videoB" autoplay muted playsinline webkit-playsinline x5-playsinline preload="auto" poster="fish-poster-hq.jpg"></video>
      </div>

      <video
        class="mobile-fish-video"
        id="mobileVideo"
        src="fish-loop-720p.mp4"
        poster="fish-poster-hq.jpg"
        autoplay
        muted
        loop
        playsinline
        webkit-playsinline
        x5-playsinline
        x5-video-player-type="h5-page"
        x5-video-player-fullscreen="false"
        x5-video-orientation="landscape"
        disablepictureinpicture
        preload="auto"
      ></video>

      <div class="mobile-loop-mask" id="mobileLoopMask"></div>
      <div class="video-overlay"></div>
      <div class="video-label">A quiet place for two</div>
    </aside>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const PROJECTS = [
      ["🎤","KTV"],["🎱","台球"],["🧩","拼豆"],["🧁","烘焙"],
      ["🍽️","一起吃饭"],["🎬","看电影"],["🌃","散步聊天"],["☕","下午茶"],
      ["🎮","电子游戏"],["🀄","打麻将"],["🍳","做饭"],["🐠","花鸟鱼市场"],
      ["🦒","动物园"],["🌿","植物园"],["🚗","开车兜风"],["🪡","一起做手工"],
      ["🎡","游乐园"],["🌇","看日落"],["🧸","抓娃娃"],["📚","逛书店"],
      ["🐱","猫咖"],["✨","出来再说"]
    ];

    const NO_MESSAGES = [
      "这个选项今天不太配合。",
      "再想一下。",
      "它好像不接受拒绝。",
      "手速不错，但还差一点。",
      "旁边的同意更容易点。",
      "拒绝选项正在休息。",
      "今天只开放同意。"
    ];

    const $ = (s) => document.querySelector(s);
    const questionView = $("#questionView");
    const plannerView = $("#plannerView");
    const successView = $("#successView");
    const stepLabel = $("#stepLabel");
    const answerZone = $("#answerZone");
    const yesBtn = $("#yesBtn");
    const noBtn = $("#noBtn");
    const answerStatus = $("#answerStatus");
    const projectGrid = $("#projectGrid");
    const plannerStatus = $("#plannerStatus");
    const yearSelect = $("#yearSelect");
    const monthSelect = $("#monthSelect");
    const daySelect = $("#daySelect");
    const weekdayText = $("#weekdayText");
    const ticketImage = $("#ticketImage");
    const toast = $("#toast");

    let selectedProjects = [];
    let noAttempts = 0;
    let yesScale = 1;
    let noScale = 1;
    let ticketBlob = null;
    let ticketBlobUrl = "";

    function showView(view, step){
      [questionView, plannerView, successView].forEach((item) => item.classList.remove("active"));
      view.classList.add("active");
      stepLabel.textContent = `${String(step).padStart(2,"0")} / 03`;
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function moveNoButton(event){
      if(event){event.preventDefault();event.stopPropagation();}
      noAttempts += 1;
      const zone = answerZone.getBoundingClientRect();
      const button = noBtn.getBoundingClientRect();
      const margin = 8;
      const maxX = Math.max(margin, zone.width - button.width - margin);
      const maxY = Math.max(34, zone.height - button.height - margin);
      const x = margin + Math.random() * Math.max(0,maxX-margin);
      const y = 28 + Math.random() * Math.max(0,maxY-28);
      noBtn.style.left = `${x}px`;
      noBtn.style.top = `${y}px`;
      noScale = Math.max(.34,noScale-.07);
      yesScale = Math.min(1.35,yesScale+.045);
      noBtn.style.setProperty("--no-scale",noScale);
      yesBtn.style.setProperty("--yes-scale",yesScale);
      answerStatus.textContent = NO_MESSAGES[(noAttempts-1)%NO_MESSAGES.length];
      if(noAttempts>8){noBtn.style.opacity=".3";noBtn.textContent="点不到";}
    }

    ["mouseenter","pointerdown","touchstart","click"].forEach((eventName) => {
      noBtn.addEventListener(eventName,moveNoButton,{passive:false});
    });
    yesBtn.addEventListener("click",() => showView(plannerView,2));
    $("#backBtn").addEventListener("click",() => showView(questionView,1));
    $("#restartBtn").addEventListener("click",() => showView(plannerView,2));

    function daysInMonth(year,month){return new Date(year,month,0).getDate();}
    function initDate(){
      const now = new Date();
      for(let y=now.getFullYear();y<=now.getFullYear()+3;y++) yearSelect.add(new Option(`${y}年`,y));
      for(let m=1;m<=12;m++) monthSelect.add(new Option(`${m}月`,m));
      yearSelect.value=now.getFullYear();
      monthSelect.value=now.getMonth()+1;
      populateDays(now.getDate());
      [yearSelect,monthSelect].forEach((el)=>el.addEventListener("change",()=>populateDays(1)));
      daySelect.addEventListener("change",updateWeekday);
    }
    function populateDays(preferred=1){
      const count=daysInMonth(Number(yearSelect.value),Number(monthSelect.value));
      daySelect.innerHTML="";
      for(let d=1;d<=count;d++) daySelect.add(new Option(`${d}日`,d));
      daySelect.value=Math.min(preferred,count);
      updateWeekday();
    }
    function updateWeekday(){
      const date=new Date(Number(yearSelect.value),Number(monthSelect.value)-1,Number(daySelect.value));
      weekdayText.textContent=["周日","周一","周二","周三","周四","周五","周六"][date.getDay()];
      updatePlannerStatus();
    }
    function dateText(){return `${yearSelect.value}年${monthSelect.value}月${daySelect.value}日 ${weekdayText.textContent}`;}

    function renderProjects(){
      projectGrid.innerHTML=PROJECTS.map(([icon,name],index)=>`
        <button class="project-btn" type="button" data-index="${index}">
          <span class="project-icon">${icon}</span>
          <span class="project-name">${name}</span>
          <span class="project-check">✓</span>
        </button>`).join("");
      projectGrid.querySelectorAll(".project-btn").forEach((button)=>{
        button.addEventListener("click",()=>{
          const name=PROJECTS[Number(button.dataset.index)][1];
          if(selectedProjects.includes(name)){
            selectedProjects=selectedProjects.filter((item)=>item!==name);
            button.classList.remove("selected");
          }else{
            selectedProjects.push(name);
            button.classList.add("selected");
          }
          updatePlannerStatus();
        });
      });
    }

    function updatePlannerStatus(){
      plannerStatus.textContent=selectedProjects.length
        ? `已选：${dateText()} · ${selectedProjects.join("、")}`
        : "选择一个日期和至少一个项目。";
    }

    function pairName(){
      const mine=$("#myNameInput").value.trim()||"我";
      const partner=$("#partnerNameInput").value.trim()||"你";
      return `${mine} × ${partner}`;
    }

    function roundedRect(ctx,x,y,w,h,r){
      ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
    }
    function fillRound(ctx,x,y,w,h,r,fill){roundedRect(ctx,x,y,w,h,r);ctx.fillStyle=fill;ctx.fill();}
    function wrapCanvasText(ctx,text,maxWidth,maxLines=2){
      const chars=Array.from(text);const lines=[];let current="";
      for(const ch of chars){const next=current+ch;if(current&&ctx.measureText(next).width>maxWidth){lines.push(current);current=ch;if(lines.length===maxLines-1)break;}else current=next;}
      if(current)lines.push(current);return lines.slice(0,maxLines);
    }

    function generateTicket(){
      const canvas=document.createElement("canvas");canvas.width=1600;canvas.height=900;
      const ctx=canvas.getContext("2d");
      const bg=ctx.createLinearGradient(0,0,1600,900);bg.addColorStop(0,"#061219");bg.addColorStop(1,"#0b242d");ctx.fillStyle=bg;ctx.fillRect(0,0,1600,900);
      ctx.globalAlpha=.18;ctx.fillStyle="#52a7a7";ctx.beginPath();ctx.arc(1430,100,270,0,Math.PI*2);ctx.fill();ctx.fillStyle="#e79a45";ctx.beginPath();ctx.arc(180,830,220,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      ctx.save();ctx.shadowColor="rgba(0,0,0,.35)";ctx.shadowBlur=44;ctx.shadowOffsetY=24;fillRound(ctx,70,90,1460,720,38,"#eaf2ef");ctx.restore();
      const stub=ctx.createLinearGradient(1030,90,1530,810);stub.addColorStop(0,"#dce9e6");stub.addColorStop(1,"#c8dddd");ctx.save();roundedRect(ctx,70,90,1460,720,38);ctx.clip();ctx.fillStyle=stub;ctx.fillRect(1030,90,500,720);ctx.restore();
      ctx.strokeStyle="#b9cecc";ctx.lineWidth=3;ctx.setLineDash([12,12]);ctx.beginPath();ctx.moveTo(1028,120);ctx.lineTo(1028,780);ctx.stroke();ctx.setLineDash([]);
      [[70,450],[1530,450],[1028,90],[1028,810]].forEach(([x,y])=>{ctx.fillStyle="#082029";ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle="#d98939";ctx.font='800 36px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("DATE NIGHT · ADMIT TWO",120,170);
      ctx.fillStyle="#07151b";ctx.font='900 92px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("约会门票",120,258);
      ctx.fillStyle="#637b7f";ctx.font='500 24px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("A QUIET MOMENT FOR TWO",120,310);
      const accent=ctx.createLinearGradient(120,0,850,0);accent.addColorStop(0,"#e79a45");accent.addColorStop(1,"#52a7a7");fillRound(ctx,120,352,190,44,22,accent);ctx.fillStyle="#07151b";ctx.font='800 21px "Microsoft YaHei","PingFang SC",sans-serif';ctx.textAlign="center";ctx.fillText("SPECIAL ACCESS",215,382);ctx.textAlign="left";
      ctx.fillStyle="#637b7f";ctx.font='500 22px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("GUESTS",120,465);ctx.fillStyle="#07151b";ctx.font='800 50px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText(pairName(),120,525);
      ctx.fillStyle="#637b7f";ctx.font='500 22px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("DATE",120,620);ctx.fillStyle="#07151b";ctx.font='800 42px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText(dateText(),120,674);
      ctx.fillStyle="#637b7f";ctx.font='500 22px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("PROGRAM",120,746);ctx.fillStyle="#07151b";ctx.font='800 36px "Microsoft YaHei","PingFang SC",sans-serif';wrapCanvasText(ctx,selectedProjects.join(" · "),780,2).forEach((line,i)=>ctx.fillText(line,120,798+i*42));
      ctx.fillStyle="#d98939";ctx.font='900 27px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("VIP PASS",1080,160);ctx.fillStyle="#07151b";ctx.font='900 58px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("DATE",1080,238);ctx.fillStyle="#637b7f";ctx.font='500 22px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("WEEKDAY",1080,300);ctx.fillStyle="#07151b";ctx.font='900 48px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText(weekdayText.textContent,1080,355);
      fillRound(ctx,1080,405,330,84,22,accent);ctx.fillStyle="#07151b";ctx.font='900 34px "Microsoft YaHei","PingFang SC",sans-serif';ctx.textAlign="center";ctx.fillText("READY TO DATE",1245,458);ctx.textAlign="left";
      ctx.fillStyle="#637b7f";ctx.font='500 21px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText("SERIAL",1080,557);ctx.fillStyle="#07151b";ctx.font='800 31px "Microsoft YaHei","PingFang SC",sans-serif';ctx.fillText(`DN-${yearSelect.value}${monthSelect.value.padStart(2,"0")}${daySelect.value.padStart(2,"0")}`,1080,600);
      let x=1080;const code="1123581321345589144233377";ctx.fillStyle="#07151b";for(const ch of code){const n=Number(ch);const w=4+(n%3)*2;const h=66+(n%6)*9;ctx.fillRect(x,700-h,w,h);x+=w+5;}
      fillRound(ctx,1080,716,230,56,28,"#edf4f1");ctx.strokeStyle="#9db9b7";ctx.lineWidth=2;roundedRect(ctx,1080,716,230,56,28);ctx.stroke();ctx.fillStyle="#d98939";ctx.font='800 22px "Microsoft YaHei","PingFang SC",sans-serif';ctx.textAlign="center";ctx.fillText("ROW A · SEAT 02",1195,752);ctx.textAlign="left";
      const data=canvas.toDataURL("image/png",.95);ticketImage.src=data;canvas.toBlob((blob)=>{ticketBlob=blob;if(ticketBlobUrl)URL.revokeObjectURL(ticketBlobUrl);ticketBlobUrl=blob?URL.createObjectURL(blob):"";},"image/png",.95);
    }

    $("#confirmBtn").addEventListener("click",()=>{
      if(!selectedProjects.length){plannerStatus.textContent="请至少选择一个项目。";return;}
      generateTicket();showView(successView,3);launchConfetti();
    });

    $("#saveTicketBtn").addEventListener("click",async()=>{
      if(!ticketBlob){generateTicket();setTimeout(()=>$("#saveTicketBtn").click(),180);return;}
      try{
        if(window.showSaveFilePicker){const handle=await window.showSaveFilePicker({suggestedName:"约会门票.png",types:[{description:"PNG 图片",accept:{"image/png":[".png"]}}]});const writable=await handle.createWritable();await writable.write(ticketBlob);await writable.close();showToast("门票图片已保存");return;}
      }catch(error){if(error?.name==="AbortError")return;}
      const link=document.createElement("a");link.href=ticketBlobUrl;link.download="约会门票.png";document.body.appendChild(link);link.click();link.remove();showToast("已创建下载任务");
    });

    $("#copyBtn").addEventListener("click",async()=>{
      const text=`${pairName()} 的约会已确认\n日期：${dateText()}\n项目：${selectedProjects.join("、")}`;
      try{await navigator.clipboard.writeText(text);showToast("结果已复制");}catch{showToast("复制失败，请手动截图");}
    });

    function showToast(text){toast.textContent=text;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1800);}
    function launchConfetti(){const colors=["#e79a45","#52a7a7","#d9e7e4","#9fb9b7"];for(let i=0;i<70;i++){const piece=document.createElement("i");piece.className="confetti";piece.style.left=Math.random()*46+"vw";piece.style.background=colors[Math.floor(Math.random()*colors.length)];piece.style.setProperty("--drift",`${(Math.random()-.5)*220}px`);piece.style.animationDuration=(2+Math.random()*1.5)+"s";document.body.appendChild(piece);setTimeout(()=>piece.remove(),3800);}}

    // 视频异常不会再影响日期和项目初始化。
    const videos = [$("#videoA"), $("#videoB")];
    const mobileVideo = $("#mobileVideo");
    const mobileLoopMask = $("#mobileLoopMask");
    const visualColumn = document.querySelector(".visual-column");
    let activeVideo = 0;
    let transitioning = false;
    let videoMode = "";
    let mobileMonitorStarted = false;
    const CROSSFADE = 1.25;

    async function safePlay(video){
      try{
        video.muted = true;
        video.defaultMuted = true;
        video.volume = 0;
        video.playsInline = true;
        video.setAttribute("muted","");
        video.setAttribute("autoplay","");
        video.setAttribute("playsinline","");
        video.setAttribute("webkit-playsinline","");
        await video.play();
        return true;
      }catch(error){
        return false;
      }
    }

    function isMobileVideoMode(){
      return window.matchMedia("(max-width: 980px)").matches;
    }

    function chooseDesktopVideoSource(){
      const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      const slow = connection && (
        connection.saveData ||
        ["slow-2g","2g","3g"].includes(connection.effectiveType)
      );
      return slow ? "fish-loop-720p.mp4" : "fish-loop-1080p.mp4";
    }

    async function startMobileVideo(){
      videoMode = "mobile";

      videos.forEach((video) => {
        video.pause();
        video.removeAttribute("src");
        video.load();
      });

      mobileVideo.muted = true;
      mobileVideo.defaultMuted = true;
      mobileVideo.volume = 0;
      mobileVideo.loop = true;
      mobileVideo.playsInline = true;
      mobileVideo.setAttribute("muted","");
      mobileVideo.setAttribute("autoplay","");
      mobileVideo.setAttribute("playsinline","");
      mobileVideo.setAttribute("webkit-playsinline","");
      mobileVideo.setAttribute("x5-playsinline","");
      mobileVideo.setAttribute("x5-video-player-type","h5-page");
      mobileVideo.setAttribute("x5-video-player-fullscreen","false");

      let started = await safePlay(mobileVideo);
      if(!started){
        for(let i = 0; i < 12 && !started; i++){
          await new Promise((resolve) => setTimeout(resolve, 300));
          started = await safePlay(mobileVideo);
        }
      }

      if(!mobileMonitorStarted){
        mobileMonitorStarted = true;
        requestAnimationFrame(monitorMobileLoop);
      }
    }

    function monitorMobileLoop(){
      if(videoMode === "mobile" && Number.isFinite(mobileVideo.duration) && mobileVideo.duration > 0){
        const remaining = mobileVideo.duration - mobileVideo.currentTime;

        if(remaining <= .72 && remaining > 0){
          mobileLoopMask.classList.add("active");
        }

        // 原生 loop 回到开头后淡出遮罩，形成轻微叠化感。
        if(mobileVideo.currentTime < .35){
          mobileLoopMask.classList.remove("active");
        }

        if(mobileVideo.paused && !document.hidden){
          safePlay(mobileVideo);
        }
      }

      requestAnimationFrame(monitorMobileLoop);
    }

    async function startDesktopVideoLoop(){
      videoMode = "desktop";
      mobileVideo.pause();
      mobileLoopMask.classList.remove("active");

      const source = chooseDesktopVideoSource();
      videos.forEach((video) => {
        video.muted = true;
        video.defaultMuted = true;
        video.volume = 0;
        video.playsInline = true;
        video.preload = "auto";
        video.setAttribute("muted","");
        video.setAttribute("autoplay","");
        video.setAttribute("playsinline","");
        video.src = source;
        video.load();
      });

      videos[0].style.zIndex = "2";
      videos[1].style.zIndex = "1";

      let started = await safePlay(videos[0]);
      if(!started){
        for(let i = 0; i < 8 && !started; i++){
          await new Promise((resolve) => setTimeout(resolve, 350));
          started = await safePlay(videos[0]);
        }
      }

      requestAnimationFrame(monitorDesktopLoop);
    }

    function monitorDesktopLoop(){
      if(videoMode !== "desktop") return;

      const current = videos[activeVideo];
      if(
        !transitioning &&
        Number.isFinite(current.duration) &&
        current.duration > 0 &&
        current.currentTime >= current.duration - CROSSFADE
      ){
        crossfadeToNext();
      }

      requestAnimationFrame(monitorDesktopLoop);
    }

    async function crossfadeToNext(){
      if(videoMode !== "desktop") return;

      transitioning = true;
      const current = videos[activeVideo];
      const nextIndex = 1 - activeVideo;
      const next = videos[nextIndex];

      next.pause();
      try{next.currentTime = 0;}catch(error){}
      next.style.zIndex = "3";
      current.style.zIndex = "2";

      const started = await safePlay(next);
      if(!started){
        transitioning = false;
        return;
      }

      requestAnimationFrame(() => next.classList.add("active"));

      setTimeout(() => {
        if(videoMode !== "desktop") return;

        current.classList.remove("active");
        current.pause();
        try{current.currentTime = 0;}catch(error){}
        current.style.zIndex = "1";
        next.style.zIndex = "2";
        activeVideo = nextIndex;
        transitioning = false;
      }, CROSSFADE * 1000 + 80);
    }

    async function startResponsiveVideo(){
      if(isMobileVideoMode()){
        await startMobileVideo();
      }else{
        await startDesktopVideoLoop();
      }
    }

    async function resumeCurrentVideo(){
      if(isMobileVideoMode()){
        await safePlay(mobileVideo);
      }else{
        await safePlay(videos[activeVideo]);
      }
    }

    document.addEventListener("visibilitychange", () => {
      if(!document.hidden) resumeCurrentVideo();
    });

    window.addEventListener("pageshow", resumeCurrentVideo);
    window.addEventListener("focus", resumeCurrentVideo);
    document.addEventListener("WeixinJSBridgeReady", resumeCurrentVideo, false);

    // 微信/iOS 极少数情况下会在首屏拦截自动播放；
    // 任意首次触摸会静默恢复，不显示需要点击播放的按钮。
    const interactionResume = () => resumeCurrentVideo();
    document.addEventListener("touchstart", interactionResume, {once:true, passive:true});
    document.addEventListener("pointerdown", interactionResume, {once:true, passive:true});

    function initializePage(){
      initDate();
      renderProjects();
      updatePlannerStatus();
      startResponsiveVideo();
    }

    if(document.readyState === "loading"){
      document.addEventListener("DOMContentLoaded", initializePage, {once:true});
    }else{
      initializePage();
    }

    let resizeTimer = 0;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const expectedMode = isMobileVideoMode() ? "mobile" : "desktop";
        if(expectedMode !== videoMode){
          startResponsiveVideo();
        }
      }, 220);
    });
  </script>
